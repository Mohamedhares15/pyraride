kind = "web"
previewPath = "/"
title = "PyraRides"
version = "1.0.0"
id = "artifacts/pyrarides"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22169

[services.development]
run = "pnpm --filter @workspace/pyrarides run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pyrarides", "run", "build" ]
publicDir = "artifacts/pyrarides/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22169"
BASE_PATH = "/"
